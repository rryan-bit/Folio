// CALENDAR
// ═══════════════════════════════════════════════════════
let calDate=new Date();

function getCalEvents(){
  const evs=[];
  (S.invoices||[]).filter(i=>i.due&&['sent','unpaid'].includes(invStatus(i))).forEach(i=>evs.push({date:i.due,label:i.number+' due',type:'invoice',icon:'📄',color:'#ea580c'}));
  (S.invoices||[]).filter(i=>invStatus(i)==='overdue').forEach(i=>evs.push({date:i.due,label:'⚠ '+i.number+' OVERDUE',type:'overdue',icon:'🚨',color:'#dc2626'}));
  (S.projects||[]).filter(p=>p.status==='active'&&p.deadline).forEach(p=>evs.push({date:p.deadline,label:p.name+' deadline',type:'project',icon:'📁',color:'#2d5be3'}));
  (S.tasks||[]).filter(t=>t.status!=='done'&&t.due).forEach(t=>evs.push({date:t.due,label:t.title,type:'task',icon:'✅',color:'#16a34a'}));
  (S.leads||[]).filter(l=>l.followUp).forEach(l=>evs.push({date:l.followUp,label:'Follow up: '+l.name,type:'lead',icon:'🎯',color:'#7c3aed'}));
  (S.quotes||[]).filter(q=>q.expiry&&['sent','draft'].includes(q.status)).forEach(q=>evs.push({date:q.expiry,label:q.number+' expires',type:'quote',icon:'📋',color:'#d97706'}));
  return evs;
}

function renderCalendar(){
  const evs=getCalEvents();
  const year=calDate.getFullYear();
  const month=calDate.getMonth();
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const monthName=calDate.toLocaleDateString('en-AU',{month:'long',year:'numeric'});
  const t=today();

  // Upcoming events (next 30 days)
  const upcoming=evs.filter(e=>e.date>=t&&e.date<=addDays(t,30)).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,8);

  document.getElementById('page-calendar').innerHTML=`
  <div class="ph">
    <div class="ph-left"><h1>Calendar</h1><p>Deadlines, due dates, and follow-ups</p></div>
    <div class="ph-right">
      <button class="btn btn-secondary" onclick="calDate.setMonth(calDate.getMonth()-1);renderCalendar()">← Prev</button>
      <span style="font-size:14px;font-weight:700;padding:0 8px;min-width:160px;text-align:center;display:inline-block">${monthName}</span>
      <button class="btn btn-secondary" onclick="calDate.setMonth(calDate.getMonth()+1);renderCalendar()">Next →</button>
      <button class="btn btn-ghost btn-sm" onclick="calDate=new Date();renderCalendar()">Today</button>
    </div>
  </div>
  <div class="card mb4">
    <div class="card-body" style="padding:14px">
      <div class="cal-grid" style="margin-bottom:6px">
        ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-dh">${d}</div>`).join('')}
      </div>
      <div class="cal-grid">
        ${Array(firstDay===0?0:firstDay).fill(0).map(()=>'<div class="cal-day other"></div>').join('')}
        ${Array.from({length:daysInMonth},(_,i)=>{
          const day=i+1;
          const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
          const dayEvs=evs.filter(e=>e.date===ds);
          const isT=ds===t;
          return`<div class="cal-day${isT?' today':''}">
            <div class="cal-dn" style="color:${isT?'var(--accent)':'var(--text)'};font-weight:${isT?'800':'600'}">${day}</div>
            ${dayEvs.slice(0,3).map(e=>`<div class="cal-ev" style="background:${e.color}" title="${e.label}">${e.label}</div>`).join('')}
            ${dayEvs.length>3?`<div style="font-size:9px;color:var(--muted)">+${dayEvs.length-3} more</div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>
  <div class="g2">
    <div class="card">
      <div class="card-hd"><div class="card-title">Upcoming (Next 30 Days)</div></div>
      <div class="card-body p0">
        ${upcoming.length===0?`<div class="empty"><p>No upcoming events</p></div>`:
          upcoming.map(e=>`
            <div class="act-item" style="padding:9px 18px">
              <div class="act-ic" style="background:${e.color}22;color:${e.color}">${e.icon}</div>
              <div class="act-txt"><div class="fw6">${e.label}</div><div class="fs11 tc-m">${e.type} · ${fmtDate(e.date)}</div></div>
              <span class="badge" style="background:${isOver(e.date)?'var(--red-l)':'var(--accent-l)'};color:${isOver(e.date)?'var(--red)':'var(--accent)'}">${fmtShort(e.date)}</span>
            </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-hd"><div class="card-title">Overdue Items</div></div>
      <div class="card-body p0">
        ${evs.filter(e=>isOver(e.date)).length===0?`<div class="empty"><div style="font-size:28px;margin-bottom:8px">🎉</div><p>Nothing overdue! Great work.</p></div>`:
          evs.filter(e=>isOver(e.date)).slice(0,6).map(e=>`
            <div class="act-item" style="padding:9px 18px">
              <div class="act-ic" style="background:var(--red-l);color:var(--red)">${e.icon}</div>
              <div class="act-txt"><div class="fw6">${e.label}</div><div class="fs11 tc-r">Overdue since ${fmtDate(e.date)}</div></div>
            </div>`).join('')}
      </div>
    </div>
  </div>`;
}

// SETTINGS
// ═══════════════════════════════════════════════════════
function renderSettings(){
  const s=S.settings;
  document.getElementById('page-settings').innerHTML=`
  <div class="ph">
    <div class="ph-left"><h1>Settings</h1><p>Business profile, preferences, and data management</p></div>

      </div>
    </div>

    <div class="card">
      <div class="card-hd"><div class="card-title">Financial Defaults</div></div>
      <div class="card-body">
        <div class="fgrid" style="gap:13px">
          <div class="fg"><label>Default Tax Rate (%)</label><input class="fc" type="number" id="s-tax" value="${s.taxRate??10}" min="0" max="100"/></div>
          <div class="fg"><label>Default Payment Terms (days)</label><input class="fc" type="number" id="s-terms" value="${s.payTerms??14}" min="1"/></div>
          <div class="fg"><label>Currency</label>

              ${[['AUD','$'],['USD','$'],['GBP','£'],['EUR','€'],['NZD','$'],['CAD','$'],['SGD','$'],['HKD','$']].map(([c,sym])=>`<option value="${c}" data-sym="${sym}" ${s.currency===c?'selected':''}>${c} (${sym})</option>`).join('')}

    <div class="card">

          <div class="fg"><label>Bank Name</label><input class="fc" id="s-bank" value="${s.bankName||''}"/></div>
          <div class="fg"><label>BSB</label><input class="fc" id="s-bsb" value="${s.bsb||''}"/></div>
          <div class="fg"><label>Account Number</label><input class="fc" id="s-acct" value="${s.accountNo||''}"/></div>
          <div class="fg s2"><label>Payment Instructions (shown on invoices & PDFs)</label><textarea class="fc" id="s-pay" rows="3">${s.paymentDetails||''}</textarea></div>

    <div class="card">

          <button class="btn ${s.theme!=='dark'?'btn-primary':'btn-secondary'}" onclick="setTheme('light');renderSettings()">☀️ Light Mode</button>

function saveSettings(){
  const sel=document.getElementById('s-cur');
  S.settings={
    ...S.settings,
    bizName:document.getElementById('s-biz')?.value.trim()||S.settings.bizName,
    ownerName:document.getElementById('s-owner')?.value.trim()||S.settings.ownerName,
    email:document.getElementById('s-email')?.value.trim(),
    phone:document.getElementById('s-phone')?.value.trim(),
    website:document.getElementById('s-web')?.value.trim(),
    abn:document.getElementById('s-abn')?.value.trim(),
    address:document.getElementById('s-addr')?.value.trim(),
    taxRate:parseFloat(document.getElementById('s-tax')?.value)||10,
    payTerms:parseInt(document.getElementById('s-terms')?.value)||14,
    currency:sel?.value||'AUD',
    sym:sel?.options[sel?.selectedIndex]?.dataset?.sym||'$',
    invPrefix:document.getElementById('s-invpfx')?.value.trim()||'INV',
    quotePrefix:document.getElementById('s-qpfx')?.value.trim()||'QUO',
    bankName:document.getElementById('s-bank')?.value.trim(),
    bsb:document.getElementById('s-bsb')?.value.trim(),
    accountNo:document.getElementById('s-acct')?.value.trim(),
    paymentDetails:document.getElementById('s-pay')?.value.trim(),
  };
  saveState();updateSidebar();toast('Settings saved','s');
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
function init(){
  loadState();
  setTheme(S.settings.theme||'light');
  updateSidebar();
  updateBadges();
  renderDash();

  // Mobile menu button
  if(window.innerWidth<=900){
    const mb=document.getElementById('menu-btn');
    if(mb)mb.style.display='flex';
  }
  window.addEventListener('resize',()=>{
    const mb=document.getElementById('menu-btn');
    if(mb)mb.style.display=window.innerWidth<=900?'flex':'none';
  });
}

// Fix the greeting string template issue
function getGreetStr(){
  const h=new Date().getHours();
  return h<12?'Good morning':h<17?'Good afternoon':'Good evening';
}

// Patch renderDash to use fixed greeting
const _renderDash=renderDash;
function renderDash(){
  updateBadges();
  const invs=S.invoices||[];const exps=S.expenses||[];
  const projs=S.projects||[];const tasks=S.tasks||[];
  const earned=invs.filter(i=>i.status==='paid').reduce((s,i)=>s+calcInv(i).total,0);
  const outstanding=invs.filter(i=>['sent','unpaid'].includes(invStatus(i))).reduce((s,i)=>s+calcInv(i).balance,0);
  const overdueAmt=invs.filter(i=>invStatus(i)==='overdue').reduce((s,i)=>s+calcInv(i).balance,0);
  const totalExp=exps.reduce((s,e)=>s+parseFloat(e.amount||0),0);
  const netProfit=earned-totalExp;
  const activeProj=projs.filter(p=>p.status==='active').length;
  const overdueT=tasks.filter(t=>t.status!=='done'&&isOver(t.due)).length;
  const months=[];
  for(let i=5;i>=0;i--){const key=fmtMonKey(i);const rev=invs.filter(inv=>inv.status==='paid'&&inv.date?.startsWith(key)).reduce((s,inv)=>s+calcInv(inv).total,0);const exp=exps.filter(e=>e.date?.startsWith(key)).reduce((s,e)=>s+parseFloat(e.amount||0),0);months.push({key,lbl:fmtMonLabel(key),rev,exp});}
  const maxChart=Math.max(...months.map(m=>Math.max(m.rev,m.exp)),1);
  const curKey=fmtMonKey(0);
  const deadlines=[
    ...projs.filter(p=>p.status==='active'&&p.deadline).map(p=>({label:p.name,date:p.deadline,type:'project',id:p.id})),
    ...tasks.filter(t=>t.status!=='done'&&t.due).map(t=>({label:t.title,date:t.due,type:'task',id:t.id})),
    ...invs.filter(i=>['sent','unpaid'].includes(invStatus(i))&&i.due).map(i=>({label:i.number+' due',date:i.due,type:'invoice',id:i.id})),
  ].sort((a,b)=>a.date.localeCompare(b.date)).slice(0,5);

  const greet=getGreetStr();
  const firstName=(S.settings.ownerName||'').split(' ')[0]||'there';

  document.getElementById('page-dashboard').innerHTML=`
  <div class="ph">
    <div class="ph-left">
      <h1>${greet}, ${firstName} 👋</h1>
      <p>Here's what's happening with your business today.</p>
    </div>
    <div class="ph-right">
      <div class="qa-grid">
        <div class="qa" onclick="openInvModal()"><span>📄</span> New Invoice</div>
        <div class="qa" onclick="openClientModal()"><span>👤</span> Add Client</div>
        <div class="qa" onclick="nav('time')"><span>⏱</span> Start Timer</div>
        <div class="qa" onclick="openExpModal()"><span>💸</span> Log Expense</div>
        <div class="qa" onclick="openQuoteModal()"><span>📋</span> New Quote</div>
      </div>
    </div>
  </div>
  <div class="stat-grid" style="grid-template-columns:repeat(6,1fr)">
    <div class="stat"><div class="stat-ic">💰</div><div class="stat-lbl">Total Earned</div><div class="stat-val g">${moneyK(earned)}</div><div class="stat-sub">${invs.filter(i=>i.status==='paid').length} paid invoices</div></div>
    <div class="stat"><div class="stat-ic">⏳</div><div class="stat-lbl">Outstanding</div><div class="stat-val o">${moneyK(outstanding)}</div><div class="stat-sub">${invs.filter(i=>['sent','unpaid'].includes(invStatus(i))).length} invoices</div></div>
    <div class="stat"><div class="stat-ic">🚨</div><div class="stat-lbl">Overdue</div><div class="stat-val r">${moneyK(overdueAmt)}</div><div class="stat-sub">${invs.filter(i=>invStatus(i)==='overdue').length} overdue</div></div>
    <div class="stat"><div class="stat-ic">📈</div><div class="stat-lbl">Net Profit</div><div class="stat-val ${netProfit>=0?'g':'r'}">${moneyK(netProfit)}</div><div class="stat-sub">After expenses</div></div>
    <div class="stat"><div class="stat-ic">📁</div><div class="stat-lbl">Active Projects</div><div class="stat-val b">${activeProj}</div><div class="stat-sub">${projs.length} total</div></div>
    <div class="stat"><div class="stat-ic">⚡</div><div class="stat-lbl">Overdue Tasks</div><div class="stat-val ${overdueT>0?'r':'g'}">${overdueT}</div><div class="stat-sub">${tasks.filter(t=>t.status!=='done').length} open</div></div>
  </div>
  <div class="g2 mb4">
    <div class="card">
      <div class="card-hd">
        <div><div class="card-title">Revenue vs Expenses</div><div class="card-sub">Last 6 months</div></div>
        <div style="display:flex;gap:10px;font-size:11.5px">
          <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;background:var(--accent);border-radius:2px;display:inline-block"></span>Revenue</span>
          <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;background:var(--red-l);border:1px solid var(--red-b);border-radius:2px;display:inline-block"></span>Expenses</span>
        </div>
      </div>
      <div class="card-body">
        <div class="chart-bars">
          ${months.map(m=>`
            <div class="chart-col">
              <div style="flex:1;display:flex;align-items:flex-end;gap:2px;width:100%">
                <div class="chart-bar ${m.key===curKey?'cur':''}" style="flex:1;height:${Math.max(4,(m.rev/maxChart)*118)}px" title="Rev: ${money(m.rev)}"></div>
                <div class="chart-bar exp" style="flex:1;height:${Math.max(4,(m.exp/maxChart)*118)}px" title="Exp: ${money(m.exp)}"></div>
              </div>
              <div class="chart-lbl">${m.lbl}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-hd"><div class="card-title">Invoice Status</div><button class="btn btn-sm btn-secondary" onclick="nav('invoices')">View All</button></div>
      <div class="card-body">
        ${[
          {lbl:'Paid',n:invs.filter(i=>i.status==='paid').length,cls:'g'},
          {lbl:'Outstanding',n:invs.filter(i=>['sent','unpaid'].includes(invStatus(i))).length,cls:'o'},
          {lbl:'Overdue',n:invs.filter(i=>invStatus(i)==='overdue').length,cls:'r'},
          {lbl:'Draft',n:invs.filter(i=>i.status==='draft').length,cls:''},
        ].map(r=>{
          const pct=invs.length?Math.round(r.n/invs.length*100):0;
          return`<div class="mb3"><div class="flex items-c jc-b mb2"><span class="fw6 fs12">${r.lbl}</span><span class="tc-m fs12">${r.n}</span></div><div class="prog"><div class="prog-fill ${r.cls}" style="width:${pct}%"></div></div></div>`;
        }).join('')}
      </div>
    </div>
  </div>
  <div class="g2">
    <div class="card">
      <div class="card-hd"><div class="card-title">Upcoming Deadlines</div></div>
      <div class="card-body p0">
        ${deadlines.length===0?`<div class="empty"><div class="empty-ic">📅</div><p>No upcoming deadlines — all clear!</p></div>`:
          deadlines.map(d=>{
            const over=isOver(d.date);
            const icons={project:'📁',task:'✅',invoice:'📄'};
            return`<div class="act-item" style="padding:9px 18px">
              <div class="act-ic" style="background:${over?'var(--red-l)':'var(--surface2)'};">${icons[d.type]}</div>
              <div class="act-txt"><div class="fw6">${d.label}</div><div style="font-size:11px;color:${over?'var(--red)':'var(--muted)'}">${over?'⚠ Overdue · ':''}${fmtDate(d.date)}</div></div>
              <span class="badge b-${d.type==='project'?'blue':d.type==='task'?'green':'orange'}">${d.type}</span>
            </div>`;
          }).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-hd"><div class="card-title">Recent Activity</div></div>
      <div class="card-body p0">
        ${(S.activity||[]).length===0?`<div class="empty"><p>No activity yet</p></div>`:
          (S.activity||[]).slice(0,6).map(a=>`
            <div class="act-item" style="padding:9px 18px">
              <div class="act-ic">${a.icon}</div>
              <div class="act-txt"><span class="fw6">${a.entity}</span> <span class="tc-m">${a.action}</span></div>
              <div class="act-time">${fmtShort(a.date)}</div>
            </div>`).join('')}
      </div>
    </div>
  </div>`;
}

init();
</script>
</body>
</html>
