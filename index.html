<style>
/* ── css/style.css ── */
/* ═══════════════════════════════════════
   FOLIO DESIGN SYSTEM
═══════════════════════════════════════ */
:root {
  --bg:          #f4f2ee;
  --bg2:         #ede9e3;
  --surface:     #ffffff;
  --surface2:    #f9f8f6;
  --surface3:    #f0ede8;
  --border:      #e5e0d9;
  --border2:     #d4cfc6;
  --text:        #1a1814;
  --text2:       #4a453e;
  --muted:       #9a9188;
  --sidebar:     #14120e;
  --sidebar2:    #1f1d18;
  --s-text:      rgba(255,255,255,.65);
  --s-active:    rgba(255,255,255,.1);
  --s-border:    rgba(255,255,255,.07);
  --accent:      #2d5be3;
  --accent-h:    #1e47cc;
  --accent-l:    #eef2fd;
  --accent-b:    #c7d5f8;
  --teal:        #0d9488;
  --teal-l:      #f0fdfa;
  --green:       #16a34a;
  --green-l:     #f0fdf4;
  --green-b:     #bbf7d0;
  --orange:      #ea580c;
  --orange-l:    #fff7ed;
  --orange-b:    #fed7aa;
  --red:         #dc2626;
  --red-l:       #fef2f2;
  --red-b:       #fecaca;
  --purple:      #7c3aed;
  --purple-l:    #f5f3ff;
  --purple-b:    #ddd6fe;
  --amber:       #d97706;
  --amber-l:     #fffbeb;
  --amber-b:     #fde68a;
  --sidebar-w:   238px;
  --topbar-h:    54px;
  --r:           10px;
  --r-lg:        14px;
  --r-sm:        6px;
  --shadow:      0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:   0 4px 16px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.04);
  --shadow-lg:   0 20px 48px rgba(0,0,0,.12),0 8px 20px rgba(0,0,0,.06);
}
[data-theme=dark] {
  --bg:#0f0e0c; --bg2:#141310; --surface:#1a1916; --surface2:#201e1b;
  --surface3:#272420; --border:#2c2924; --border2:#3d3a34;
  --text:#f0ece4; --text2:#b8b0a4; --muted:#6b6358;
  --sidebar:#0a0908; --sidebar2:#141210;
  --accent-l:#1a2f6b; --accent-b:#1e3a8a;
  --teal-l:#022c22; --green-l:#052e16; --green-b:#14532d;
  --orange-l:#431407; --orange-b:#7c2d12;
  --red-l:#450a0a; --red-b:#7f1d1d;
  --purple-l:#2e1065; --purple-b:#4c1d95;
  --amber-l:#1c1200; --amber-b:#78350f;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13.5px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer}
input,select,textarea{font-family:'Plus Jakarta Sans',sans-serif}

/* LAYOUT */
#app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{
  width:var(--sidebar-w);background:var(--sidebar);
  display:flex;flex-direction:column;flex-shrink:0;
  overflow-y:auto;overflow-x:hidden;scrollbar-width:none;
  position:relative;z-index:40;
  transition:width .22s ease;
}
.sidebar::-webkit-scrollbar{display:none}
.sidebar-logo{
  padding:18px 16px 14px;
  border-bottom:1px solid var(--s-border);
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;
}
.logo-mark{
  width:34px;height:34px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,#2d5be3,#7c3aed);
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#fff;
  box-shadow:0 4px 12px rgba(45,91,227,.4);
}
.logo-text{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:#fff;letter-spacing:-.02em}
.logo-sub{font-size:10px;color:rgba(255,255,255,.25);letter-spacing:.06em;margin-top:1px}

.nav-section-label{
  font-size:9.5px;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:rgba(255,255,255,.2);
  padding:12px 14px 4px;
}
.nav-item{
  display:flex;align-items:center;gap:9px;
  padding:8px 10px;margin:1px 8px;border-radius:7px;
  color:var(--s-text);font-size:13px;font-weight:500;
  cursor:pointer;user-select:none;
  transition:background .12s,color .12s;
  white-space:nowrap;position:relative;
}
.nav-item:hover{background:var(--s-active);color:rgba(255,255,255,.9)}
.nav-item.active{background:rgba(45,91,227,.3);color:#fff}
.nav-item.active .nav-icon{color:#7aa4ff}
.nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.nav-badge{
  margin-left:auto;background:var(--red);color:#fff;
  font-size:10px;font-weight:700;
  padding:1px 6px;border-radius:99px;min-width:18px;text-align:center;
}
.sidebar-bottom{
  margin-top:auto;padding:10px 8px;
  border-top:1px solid var(--s-border);flex-shrink:0;
}
.sidebar-user{
  display:flex;align-items:center;gap:9px;
  padding:8px 10px;border-radius:7px;cursor:pointer;
}
.sidebar-user:hover{background:var(--s-active)}
.u-av{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#2d5be3,#7c3aed);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:#fff;
}
.u-name{font-size:12px;font-weight:700;color:rgba(255,255,255,.85)}
.u-role{font-size:10px;color:rgba(255,255,255,.3)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* TOPBAR */
.topbar{
  height:var(--topbar-h);background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:10px;
  flex-shrink:0;position:relative;z-index:30;
}
.topbar-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;letter-spacing:-.01em}
.tb-spacer{flex:1}
.search-wrap{
  display:flex;align-items:center;gap:7px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:5px 10px;
  width:210px;transition:width .2s,border-color .15s;cursor:text;
}
.search-wrap:focus-within{width:260px;border-color:var(--accent)}
.search-wrap input{background:none;border:none;outline:none;font-size:12.5px;color:var(--text);width:100%}
.search-wrap input::placeholder{color:var(--muted)}
.search-ic{color:var(--muted);font-size:13px}
.kbd{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--surface3);border:1px solid var(--border2);border-radius:3px;padding:1px 5px;color:var(--muted)}
.tb-btn{
  width:32px;height:32px;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--text2);transition:all .15s;position:relative;
}
.tb-btn:hover{background:var(--surface3);border-color:var(--border2)}
.tb-dot{position:absolute;top:5px;right:5px;width:6px;height:6px;background:var(--red);border-radius:50%;border:1.5px solid var(--surface)}

/* PAGE CONTENT */
.page-wrap{flex:1;overflow-y:auto;overflow-x:hidden;padding:22px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.page-wrap::-webkit-scrollbar{width:5px}
.page-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.page{display:none}
.page.active{display:block;animation:fadeUp .18s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* PAGE HEADER */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:14px;flex-wrap:wrap}
.ph-left h1{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;letter-spacing:-.03em;line-height:1.1}
.ph-left p{font-size:12.5px;color:var(--muted);margin-top:3px}
.ph-right{display:flex;gap:7px;align-items:center;flex-wrap:wrap}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:var(--r-sm);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:12.5px;font-weight:600;padding:7px 14px;transition:all .14s;white-space:nowrap;line-height:1.4}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 1px 3px rgba(45,91,227,.3)}
.btn-primary:hover{background:var(--accent-h);transform:translateY(-1px);box-shadow:0 4px 12px rgba(45,91,227,.3)}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--surface2);border-color:var(--border2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid transparent}
.btn-ghost:hover{background:var(--surface2);border-color:var(--border)}
.btn-danger{background:var(--red-l);color:var(--red);border:1px solid var(--red-b)}
.btn-danger:hover{background:var(--red-b)}
.btn-success{background:var(--green-l);color:var(--green);border:1px solid var(--green-b)}
.btn-success:hover{background:var(--green-b)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.btn-icon{padding:7px;width:32px;height:32px}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow)}
.card-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-title{font-family:'Syne',sans-serif;font-size:13.5px;font-weight:700;letter-spacing:-.01em}
.card-sub{font-size:11.5px;color:var(--muted);margin-top:2px}
.card-body{padding:18px}
.card-body.p0{padding:0}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden;transition:box-shadow .15s}
.stat:hover{box-shadow:var(--shadow-md)}
.stat::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--purple));opacity:0;transition:opacity .2s}
.stat:hover::after{opacity:1}
.stat-ic{position:absolute;right:14px;top:14px;font-size:22px;opacity:.1}
.stat-lbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:7px}
.stat-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.04em;line-height:1}
.stat-val.g{color:var(--green)}.stat-val.o{color:var(--orange)}.stat-val.r{color:var(--red)}.stat-val.b{color:var(--accent)}.stat-val.p{color:var(--purple)}
.stat-sub{font-size:11px;color:var(--muted);margin-top:5px;display:flex;align-items:center;gap:3px}
.up{color:var(--green)}.dn{color:var(--red)}

/* TABLES */
.tbl-wrap{overflow-x:auto;border-radius:var(--r-lg)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{border-bottom:1px solid var(--border)}
th{text-align:left;padding:9px 13px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);white-space:nowrap}
td{padding:11px 13px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{transition:background .1s}
tbody tr:hover td{background:var(--surface2)}
.td-bold{font-weight:700}
.td-muted{color:var(--muted);font-size:12px}
.td-mono{font-family:'JetBrains Mono',monospace;font-size:12px}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap}
.bdot{width:5px;height:5px;border-radius:50%;background:currentColor}
.b-blue{background:var(--accent-l);color:var(--accent);border:1px solid var(--accent-b)}
.b-green{background:var(--green-l);color:var(--green);border:1px solid var(--green-b)}
.b-orange{background:var(--orange-l);color:var(--orange);border:1px solid var(--orange-b)}
.b-red{background:var(--red-l);color:var(--red);border:1px solid var(--red-b)}
.b-purple{background:var(--purple-l);color:var(--purple);border:1px solid var(--purple-b)}
.b-amber{background:var(--amber-l);color:var(--amber);border:1px solid var(--amber-b)}
.b-gray{background:var(--surface3);color:var(--muted);border:1px solid var(--border2)}
.b-teal{background:var(--teal-l);color:var(--teal);border:1px solid #99f6e4}

/* FORMS */
.fg{display:flex;flex-direction:column;gap:5px}
.fg label,.form-label{font-size:12px;font-weight:600;color:var(--text2)}
.req{color:var(--red);margin-left:2px}
.fc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;padding:7px 10px;outline:none;transition:border-color .14s,box-shadow .14s;width:100%}
.fc:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,91,227,.08)}
.fc::placeholder{color:var(--muted)}
textarea.fc{resize:vertical;min-height:78px}
select.fc{cursor:pointer}
.form-hint{font-size:11px;color:var(--muted)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.fgrid.c1{grid-template-columns:1fr}
.fgrid.c3{grid-template-columns:1fr 1fr 1fr}
.fgrid.c4{grid-template-columns:1fr 1fr 1fr 1fr}
.fg.s2{grid-column:span 2}.fg.s3{grid-column:span 3}.fg.s4{grid-column:span 4}
.fdivider{grid-column:1/-1;border:none;border-top:1px solid var(--border);margin:4px 0}

/* MODALS */
.modal-ov{
  position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:16px;
  animation:fadeIn .13s ease;
}
.modal{
  background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);
  width:100%;max-width:560px;max-height:90vh;overflow-y:auto;
  animation:slideUp .18s ease;
}
.modal.xl{max-width:800px}.modal.sm{max-width:420px}.modal.lg{max-width:680px}
.modal-hd{
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:var(--surface);z-index:1;border-radius:var(--r-lg) var(--r-lg) 0 0;
}
.modal-hd h2{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;letter-spacing:-.02em}
.modal-close{
  width:26px;height:26px;background:var(--surface2);border:1px solid var(--border);
  border-radius:5px;display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--muted);transition:all .14s;
}
.modal-close:hover{background:var(--red-l);color:var(--red);border-color:var(--red-b)}
.modal-body{padding:20px}
.modal-ft{
  padding:13px 20px;border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;gap:7px;
  position:sticky;bottom:0;background:var(--surface);
  border-radius:0 0 var(--r-lg) var(--r-lg);
}

/* FILTERS */
.filters{display:flex;align-items:center;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.fsearch{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:5px 10px;flex:1;min-width:160px;max-width:270px}
.fsearch input{background:none;border:none;outline:none;font-size:12.5px;color:var(--text);width:100%}
.fsearch input::placeholder{color:var(--muted)}
.fsel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:6px 9px;font-size:12.5px;color:var(--text);cursor:pointer;outline:none}
.fsel:focus{border-color:var(--accent)}

/* EMPTY STATE */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-ic{font-size:36px;margin-bottom:10px;opacity:.35}
.empty h3{font-size:14.5px;font-weight:700;color:var(--text2);margin-bottom:5px}
.empty p{font-size:12.5px;line-height:1.6;max-width:300px;margin:0 auto 14px}

/* TOAST */
.toast-wrap{position:fixed;bottom:22px;right:22px;z-index:999;display:flex;flex-direction:column;gap:7px}
.toast{
  background:var(--text);color:var(--bg);padding:10px 15px;border-radius:var(--r);
  font-size:12.5px;font-weight:500;box-shadow:var(--shadow-lg);
  animation:slideUp .18s ease;display:flex;align-items:center;gap:8px;max-width:300px;
}
.toast.s{background:var(--green)}.toast.e{background:var(--red)}.toast.w{background:var(--orange)}

/* PROGRESS */
.prog{height:5px;background:var(--surface3);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:var(--accent);transition:width .4s ease}
.prog-fill.g{background:var(--green)}.prog-fill.o{background:var(--orange)}.prog-fill.r{background:var(--red)}

/* AVATAR */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
.av-sm{width:26px;height:26px;font-size:10px}
.av-md{width:34px;height:34px;font-size:13px}
.av-lg{width:44px;height:44px;font-size:17px}

/* LINE ITEMS */
.li-wrap{border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.li-wrap table thead tr{background:var(--surface2)}
.li-wrap td input{background:transparent;border:1px solid transparent;border-radius:4px;padding:4px 6px;font-size:12.5px;color:var(--text);width:100%;outline:none;font-family:'Plus Jakarta Sans',sans-serif}
.li-wrap td input:focus{border-color:var(--accent);background:var(--surface)}
.inv-totals{display:flex;flex-direction:column;align-items:flex-end;gap:4px;margin-top:10px}
.tot-row{display:flex;gap:20px;justify-content:flex-end;font-size:12.5px}
.tot-row .tl{color:var(--muted);min-width:85px;text-align:right}
.tot-row .tv{min-width:95px;text-align:right;font-weight:600;font-family:'JetBrains Mono',monospace}
.tot-row.grand{font-size:14.5px;font-weight:800}
.tot-row.grand .tv{color:var(--accent)}

/* KANBAN */
.kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px}
.kb-col{min-width:230px;max-width:248px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px;flex-shrink:0}
.kb-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.kb-title{font-size:12.5px;font-weight:700}
.kb-count{font-size:10.5px;background:var(--surface3);border:1px solid var(--border);border-radius:99px;padding:1px 7px;color:var(--muted);font-weight:600}
.kb-cards{display:flex;flex-direction:column;gap:7px;min-height:36px}
.kb-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px;cursor:grab;transition:box-shadow .14s,transform .14s;box-shadow:var(--shadow)}
.kb-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.kb-card.dragging{opacity:.45}
.kb-ct{font-size:12.5px;font-weight:600;margin-bottom:5px}
.kb-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap}

/* CHART */
.chart-bars{display:flex;align-items:flex-end;gap:5px;height:130px;padding:0 4px}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end}
.chart-bar{width:100%;border-radius:4px 4px 0 0;background:var(--accent-l);border:1px solid var(--accent-b);min-height:3px;transition:height .4s;cursor:pointer}
.chart-bar.cur{background:var(--accent);border-color:var(--accent)}
.chart-bar.exp{background:var(--red-l);border-color:var(--red-b)}
.chart-lbl{font-size:10px;color:var(--muted);white-space:nowrap}

/* TABS */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:18px}
.tab{padding:7px 13px;font-size:12.5px;font-weight:600;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .14s,border-color .14s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ACTIVITY */
.act-item{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid var(--border)}
.act-item:last-child{border-bottom:none}
.act-ic{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;background:var(--surface2)}
.act-txt{flex:1;font-size:12.5px}
.act-time{font-size:11px;color:var(--muted);white-space:nowrap}

/* QUICK ACTIONS */
.qa-grid{display:flex;gap:7px;flex-wrap:wrap}
.qa{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--r-sm);background:var(--surface);border:1px solid var(--border);cursor:pointer;font-size:12.5px;font-weight:600;transition:all .14s;color:var(--text)}
.qa:hover{background:var(--accent-l);border-color:var(--accent-b);color:var(--accent)}

/* COMMAND PALETTE */
.cmd-ov{position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:500;display:flex;align-items:flex-start;justify-content:center;padding-top:80px;animation:fadeIn .1s ease}
.cmd{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);width:100%;max-width:540px;overflow:hidden;animation:slideUp .14s ease}
.cmd-s{display:flex;align-items:center;gap:9px;padding:13px 15px;border-bottom:1px solid var(--border)}
.cmd-s input{flex:1;background:none;border:none;outline:none;font-size:15px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--text)}
.cmd-res{max-height:350px;overflow-y:auto}
.cmd-sec{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:9px 15px 4px}
.cmd-item{display:flex;align-items:center;gap:9px;padding:8px 15px;cursor:pointer;transition:background .1s}
.cmd-item:hover,.cmd-item.sel{background:var(--accent-l)}
.cmd-ic{font-size:14px;width:19px;text-align:center;color:var(--muted)}
.cmd-it{flex:1}.cmd-it-t{font-size:12.5px;font-weight:600}.cmd-it-s{font-size:11px;color:var(--muted)}

/* TIMER */
.timer-w{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow)}
.timer-d{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:500;letter-spacing:.04em}
.timer-running .timer-d{color:var(--green);animation:pulse 2s ease infinite}

/* ALERTS */
.alert{display:flex;align-items:center;gap:9px;padding:9px 13px;border-radius:var(--r);font-size:12.5px;margin-bottom:14px}
.alert-warn{background:var(--amber-l);border:1px solid var(--amber-b);color:var(--amber)}
.alert-err{background:var(--red-l);border:1px solid var(--red-b);color:var(--red)}
.alert-info{background:var(--accent-l);border:1px solid var(--accent-b);color:var(--accent)}
.alert-success{background:var(--green-l);border:1px solid var(--green-b);color:var(--green)}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
.mb4{margin-bottom:16px}.mb3{margin-bottom:12px}.mb2{margin-bottom:8px}
.flex{display:flex}.flex-col{display:flex;flex-direction:column}
.items-c{align-items:center}.jc-b{justify-content:space-between}
.gap1{gap:4px}.gap2{gap:8px}.gap3{gap:12px}
.fw7{font-weight:700}.fw6{font-weight:600}.fs12{font-size:12px}.fs11{font-size:11px}
.tc-g{color:var(--green)}.tc-r{color:var(--red)}.tc-o{color:var(--orange)}.tc-b{color:var(--accent)}.tc-m{color:var(--muted)}
.mono{font-family:'JetBrains Mono',monospace}
.w-full{width:100%}

/* SECTION DIVIDER */
.sec-div{border:none;border-top:1px solid var(--border);margin:14px 0}

/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dh{text-align:center;font-size:10.5px;font-weight:700;color:var(--muted);padding:4px}
.cal-day{min-height:76px;border:1px solid var(--border);border-radius:6px;padding:4px;background:var(--surface)}
.cal-day.today{background:var(--accent-l);border-color:var(--accent-b)}
.cal-day.other{background:var(--surface2);opacity:.6}
.cal-dn{font-size:11.5px;font-weight:700;margin-bottom:3px}
.cal-ev{font-size:10px;border-radius:3px;padding:1px 4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes spin{to{transform:rotate(360deg)}}

/* TIMELINE */
.tl-item{display:flex;gap:10px}
.tl-line{display:flex;flex-direction:column;align-items:center;width:18px;flex-shrink:0}
.tl-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);border:2px solid var(--surface);box-shadow:0 0 0 2px var(--accent);flex-shrink:0;margin-top:3px}
.tl-dot.g{background:var(--green);box-shadow:0 0 0 2px var(--green)}
.tl-dot.gray{background:var(--muted);box-shadow:0 0 0 2px var(--muted)}
.tl-con{flex:1;width:1px;background:var(--border);margin:3px 0}
.tl-ct{flex:1;padding-bottom:14px}
.tl-t{font-size:12.5px;font-weight:600}.tl-m{font-size:11.5px;color:var(--muted);margin-top:2px}

/* DROPDOWN */
.dd{position:relative;display:inline-block}
.dd-menu{position:absolute;right:0;top:calc(100% + 4px);background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-md);min-width:150px;z-index:100;animation:fadeIn .1s ease;overflow:hidden}
.dd-item{display:flex;align-items:center;gap:8px;padding:7px 13px;font-size:12.5px;cursor:pointer;transition:background .1s;color:var(--text)}
.dd-item:hover{background:var(--surface2)}
.dd-item.danger{color:var(--red)}.dd-item.danger:hover{background:var(--red-l)}
.dd-divider{border:none;border-top:1px solid var(--border);margin:3px 0}

/* SETTINGS ROW */
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-lbl{font-size:13px;font-weight:600}
.setting-desc{font-size:12px;color:var(--muted);margin-top:2px}

/* TOGGLE */
.toggle{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-s{position:absolute;cursor:pointer;inset:0;background:var(--border2);border-radius:99px;transition:background .2s}
.toggle-s::before{content:'';position:absolute;width:16px;height:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle input:checked ~ .toggle-s{background:var(--accent)}
.toggle input:checked ~ .toggle-s::before{transform:translateX(18px)}

/* RESPONSIVE */
@media(max-width:1100px){.stat-grid{grid-template-columns:repeat(3,1fr)}.g3{grid-template-columns:1fr 1fr}}
@media(max-width:900px){:root{--sidebar-w:0px}.sidebar{position:fixed;width:238px;transform:translateX(-100%);transition:transform .22s ease}.sidebar.open{transform:translateX(0)}.stat-grid{grid-template-columns:1fr 1fr}.g2,.g3{grid-template-columns:1fr}.page-wrap{padding:14px}}
@media(max-width:600px){.fgrid{grid-template-columns:1fr}.fg.s2,.fg.s3,.fg.s4{grid-column:span 1}.stat-grid{grid-template-columns:1fr 1fr}}

/* ── css/auth.css ── */
/* ═══════════════════════════════════════════════════════
   FOLIO — Auth, Onboarding, Team & Responsive Extensions
═══════════════════════════════════════════════════════ */

/* ── AUTH PAGES ── */
#auth-root, #onboarding-root {
  position:fixed;inset:0;z-index:1000;
  display:flex;align-items:stretch;
  background:var(--bg);
  font-family:'Plus Jakarta Sans',sans-serif;
}

.auth-wrap {
  display:flex;width:100%;min-height:100vh;
}

/* Left brand panel */
.auth-brand {
  width:380px;flex-shrink:0;
  background:var(--sidebar);
  padding:48px 40px;
  display:flex;flex-direction:column;
  justify-content:center;
}

.auth-logo-mark {
  width:44px;height:44px;border-radius:11px;
  background:linear-gradient(135deg,#2d5be3,#7c3aed);
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#fff;
  margin-bottom:14px;box-shadow:0 4px 14px rgba(45,91,227,.4);
}

.auth-logo-name {
  font-family:'Syne',sans-serif;font-size:28px;font-weight:800;
  color:#fff;letter-spacing:-.03em;margin-bottom:4px;
}

.auth-logo-tag {
  font-size:12px;color:rgba(255,255,255,.35);
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:40px;
}

.auth-brand-copy { display:flex;flex-direction:column;gap:10px; }

.auth-feature {
  color:rgba(255,255,255,.65);font-size:14px;
  display:flex;align-items:center;gap:8px;
}

/* Right form panel */
.auth-panel {
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:32px 20px;overflow-y:auto;
}

.auth-card {
  width:100%;max-width:480px;
}

.auth-form-wrap {
  display:flex;flex-direction:column;gap:0;
}

.auth-title {
  font-family:'Syne',sans-serif;
  font-size:24px;font-weight:800;letter-spacing:-.03em;
  margin-bottom:6px;
}

.auth-sub {
  font-size:14px;color:var(--muted);margin-bottom:24px;
}

.auth-field {
  display:flex;flex-direction:column;gap:5px;margin-bottom:14px;
}

.auth-field label {
  font-size:12.5px;font-weight:600;color:var(--text2);
}

.auth-input {
  width:100%;background:var(--surface);border:1.5px solid var(--border);
  border-radius:8px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;
  font-size:13.5px;padding:9px 12px;outline:none;
  transition:border-color .14s,box-shadow .14s;
}

.auth-input:focus {
  border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,91,227,.1);
}

.auth-input::placeholder { color:var(--muted); }
.auth-select { cursor:pointer; }
textarea.auth-input { resize:vertical;min-height:80px; }

.auth-pw-wrap { position:relative; }
.auth-pw-wrap .auth-input { padding-right:44px; }

.pw-toggle {
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;font-size:16px;color:var(--muted);
  padding:2px;
}

.pw-toggle:hover { color:var(--text); }

.pw-strength-bar {
  height:3px;background:var(--border);border-radius:99px;margin-top:5px;overflow:hidden;
}
.pw-strength-fill { height:100%;border-radius:99px;transition:width .3s,background .3s;width:0; }
.pw-strength-label { font-size:11px;margin-top:3px; }

.auth-grid-2 { display:grid;grid-template-columns:1fr 1fr;gap:12px; }

.auth-row {
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;font-size:13px;
}

.auth-check-label {
  display:flex;align-items:center;gap:7px;
  font-size:13px;color:var(--text2);cursor:pointer;
}

.auth-link { color:var(--accent);text-decoration:none;font-weight:600; }
.auth-link:hover { text-decoration:underline; }

.auth-btn {
  width:100%;background:var(--accent);color:#fff;border:none;
  border-radius:8px;padding:11px 20px;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;
  transition:background .14s,transform .1s,box-shadow .14s;
  position:relative;overflow:hidden;margin-bottom:14px;
  box-shadow:0 2px 8px rgba(45,91,227,.25);
}

.auth-btn:hover:not(:disabled) {
  background:var(--accent-h);transform:translateY(-1px);box-shadow:0 4px 16px rgba(45,91,227,.3);
}

.auth-btn:disabled { opacity:.65;cursor:not-allowed; }

.spin-icon {
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  font-size:20px;animation:spin .6s linear infinite;
}

.auth-divider {
  display:flex;align-items:center;gap:12px;
  color:var(--muted);font-size:12px;margin:4px 0 14px;
}

.auth-divider::before,.auth-divider::after {
  content:'';flex:1;height:1px;background:var(--border);
}

.auth-switch { text-align:center;font-size:13.5px;color:var(--muted);margin-bottom:14px; }

.auth-error {
  background:var(--red-l);border:1px solid var(--red-b);color:var(--red);
  border-radius:7px;padding:9px 13px;font-size:13px;margin-bottom:14px;
}

.auth-success {
  background:var(--green-l);border:1px solid var(--green-b);color:var(--green);
  border-radius:7px;padding:9px 13px;font-size:13px;margin-bottom:14px;
}

.auth-demo-hint {
  background:var(--surface2);border:1px solid var(--border);
  border-radius:7px;padding:12px;font-size:12.5px;color:var(--muted);
  text-align:center;line-height:1.6;
}

.auth-demo-btn {
  background:var(--accent-l);border:1px solid var(--accent-b);color:var(--accent);
  border-radius:6px;padding:5px 14px;font-size:12.5px;font-weight:600;
  cursor:pointer;margin-top:7px;transition:background .14s;font-family:inherit;
}

.auth-demo-btn:hover { background:var(--accent-b); }

/* ── ONBOARDING ── */
.ob-wrap {
  width:100%;min-height:100vh;display:flex;flex-direction:column;
  background:var(--bg);
}

.ob-header {
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:16px 32px;display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:16px;
}

.ob-logo {
  display:flex;align-items:center;gap:10px;
  font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--text);
}

.ob-steps {
  display:flex;align-items:center;gap:0;
}

.ob-step {
  display:flex;align-items:center;gap:7px;padding:6px 12px;
  font-size:12.5px;font-weight:600;color:var(--muted);
}

.ob-step.active { color:var(--accent); }
.ob-step.done   { color:var(--green); }

.ob-step-dot {
  width:24px;height:24px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;flex-shrink:0;
  background:var(--surface3);border:1.5px solid var(--border);color:var(--muted);
}

.ob-step.active .ob-step-dot { background:var(--accent-l);border-color:var(--accent);color:var(--accent); }
.ob-step.done   .ob-step-dot { background:var(--green-l);border-color:var(--green);color:var(--green); }

.ob-step-line { width:32px;height:1px;background:var(--border);flex-shrink:0; }

.ob-body {
  flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;
}

.ob-card {
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
  box-shadow:var(--shadow-md);padding:32px 36px;width:100%;max-width:600px;
}

.ob-card h2 {
  font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px;
}

.ob-card > p {
  font-size:13.5px;color:var(--muted);margin-bottom:24px;
}

.ob-form { margin-bottom:24px; }
.ob-actions { display:flex;gap:10px;justify-content:flex-end; }

.ob-back-btn {
  background:none;border:1px solid var(--border);border-radius:7px;
  padding:9px 18px;font-size:13.5px;font-weight:600;color:var(--text2);
  cursor:pointer;font-family:inherit;transition:background .14s;
}
.ob-back-btn:hover { background:var(--surface2); }

.ob-finish { text-align:center; }
.ob-finish-icon { font-size:56px;margin-bottom:16px; }
.ob-finish-actions { display:flex;justify-content:center;margin-top:24px; }
.ob-finish .auth-btn { max-width:280px;margin:0; }

/* ── TOPBAR USER CONTEXT ── */
.topbar-user {
  display:flex;align-items:center;gap:8px;
  padding:4px 8px;border-radius:var(--r-sm);
  cursor:pointer;transition:background .14s;
  border:1px solid transparent;
}
.topbar-user:hover { background:var(--surface2);border-color:var(--border); }
.topbar-user-name { font-size:12.5px;font-weight:600;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
.topbar-user-role { font-size:10.5px;color:var(--muted); }

/* ── PERMISSION BADGE ── */
.perm-badge {
  display:inline-flex;align-items:center;gap:3px;
  padding:2px 7px;border-radius:99px;font-size:10.5px;font-weight:600;
}

/* ── MONEY CELL (truncation-safe) ── */
.money-cell {
  display:inline-block;max-width:100%;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  cursor:default;
}

/* ── STAT CARD NUMBER SAFETY ── */
.stat-val {
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  line-height:1.1;
}

/* Scale down very large stat values */
@media (max-width:1400px) { .stat-val { font-size:22px; } }
@media (max-width:1200px) { .stat-val { font-size:20px; } }
@media (max-width:1000px) { .stat-val { font-size:18px; } }

/* ── TABLE OVERFLOW SAFETY ── */
td { max-width:280px; }

.td-truncate {
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px;
}

/* Mobile table cards */
@media(max-width:640px) {
  .tbl-card-mode table thead { display:none; }
  .tbl-card-mode table tbody tr {
    display:block;
    border:1px solid var(--border);border-radius:var(--r);
    margin-bottom:10px;padding:12px;background:var(--surface);
  }
  .tbl-card-mode table tbody td {
    display:flex;justify-content:space-between;align-items:center;
    padding:4px 0;border:none;font-size:13px;max-width:none;
  }
  .tbl-card-mode table tbody td::before {
    content:attr(data-label);
    font-size:11px;font-weight:700;text-transform:uppercase;
    letter-spacing:.07em;color:var(--muted);margin-right:8px;flex-shrink:0;
  }
}

/* ── RESPONSIVE SIDEBAR + LAYOUT ── */
@media(max-width:900px) {
  :root { --sidebar-w:0px; }
  .sidebar {
    position:fixed;left:0;top:0;bottom:0;width:240px;z-index:200;
    transform:translateX(-100%);transition:transform .22s ease;
    box-shadow:none;
  }
  .sidebar.open { transform:translateX(0);box-shadow:var(--shadow-lg); }
  .sidebar-overlay {
    position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199;
    display:none;
  }
  .sidebar.open ~ .sidebar-overlay,
  .sidebar-overlay.active { display:block; }

  #menu-btn { display:flex !important; }
  .stat-grid { grid-template-columns:repeat(2,1fr) !important; }
  .g2 { grid-template-columns:1fr !important; }
  .page-wrap { padding:14px; }
  .topbar-user-name,.topbar-user-role { display:none; }
  .search-wrap { width:160px; min-width:0; }
  .search-wrap:focus-within { width:200px; }
}

@media(max-width:600px) {
  .stat-grid { grid-template-columns:1fr 1fr !important; }
  .ph { flex-direction:column; }
  .ph-right { flex-wrap:wrap; }
  .modal { max-width:100% !important;margin:0;border-radius:var(--r-lg) var(--r-lg) 0 0; }
  .modal-ov { align-items:flex-end;padding:0; }
  .fgrid { grid-template-columns:1fr !important; }
  .fg.s2,.fg.s3 { grid-column:span 1 !important; }
  .auth-grid-2 { grid-template-columns:1fr; }
  .auth-brand { display:none; }
  .auth-panel { padding:24px 16px; }
  .ob-card { padding:20px 16px; }
  .ob-steps { display:none; }
  .topbar { padding:0 12px; gap:6px; }
  .topbar-title { font-size:14px; }
  .page-wrap { padding:12px; }
  .kb-col { min-width:200px; }
  .kanban { gap:9px; }
}

/* ── MODAL MOBILE BOTTOM SHEET ── */
@media(max-width:600px) {
  .modal-ov { align-items:flex-end; padding:0; }
  .modal {
    max-width:100% !important;
    border-radius:16px 16px 0 0;
    max-height:92vh;
  }
}

/* ── FORM RESPONSIVE ── */
@media(max-width:500px) {
  .modal-body { padding:14px; }
  .modal-hd { padding:12px 14px; }
  .modal-ft { padding:10px 14px; flex-wrap:wrap; }
}

/* ── CHART RESPONSIVE ── */
@media(max-width:700px) {
  .chart-bars { height:100px; }
  .chart-bar { min-height:2px; }
  .chart-lbl { font-size:9px; }
}

/* ── KANBAN RESPONSIVE ── */
@media(max-width:700px) {
  .kanban { scroll-snap-type:x mandatory; }
  .kb-col { scroll-snap-align:start; }
}

/* ── TOPBAR RESPONSIVE ── */

// ── js/format.js ──
// ═══════════════════════════════════════════════════════════════
// FOLIO — Formatting Helpers
// All currency, number, date, and display formatting lives here.
// Always use these functions — never format inline.
// ═══════════════════════════════════════════════════════════════

// ── Currency formatting ──

/**
 * Full money format: $1,234.56
 * Always shows 2 decimal places. Uses business currency symbol.
 */
function money(n, sym) {
  sym = sym ?? currentBusiness?.currencySymbol ?? '$';
  const num = parseFloat(n || 0);
  if (isNaN(num)) return sym + '0.00';
  return sym + Math.abs(num).toLocaleString('en-AU', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2,
  });
}

/**
 * Compact money format: $1.2K, $45.8K, $2.4M
 * Used in stat cards and charts where space is limited.
 * Full value available as title attribute via moneyCell()
 */
function moneyK(n, sym) {
  sym = sym ?? currentBusiness?.currencySymbol ?? '$';
  const num = parseFloat(n || 0);
  if (isNaN(num)) return sym + '0';
  const abs = Math.abs(num);
  const sign = num < 0 ? '−' : '';
  if (abs >= 1_000_000) return sign + sym + (abs / 1_000_000).toFixed(abs >= 10_000_000 ? 0 : 1) + 'M';
  if (abs >= 10_000)   return sign + sym + (abs / 1_000).toFixed(abs >= 100_000 ? 0 : 1) + 'K';
  if (abs >= 1_000)    return sign + sym + (abs / 1_000).toFixed(1) + 'K';
  return sign + money(num, sym);
}

/**
 * Returns an HTML span with compact value shown and full value as tooltip.
 */
function moneyCell(n, colorClass) {
  const full = money(n);
  const compact = moneyK(n);
  const cls = colorClass ? ` tc-${colorClass}` : '';
  return `<span class="money-cell${cls}" title="${full}">${compact}</span>`;
}

/**
 * Format a number as a percentage: 12.5%
 */
function pct(n, decimals = 1) {
  const num = parseFloat(n || 0);
  if (isNaN(num)) return '0%';
  return num.toFixed(decimals).replace(/\.0+$/, '') + '%';
}

/**
 * Format a plain number with commas: 1,234,567
 */
function fmtNum(n) {
  return parseFloat(n || 0).toLocaleString('en-AU');
}

// ── Date formatting ──

function fmtDate(d) {
  if (!d) return '—';
  try { return new Date(d.slice(0,10) + 'T00:00:00').toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' }); }
  catch(e) { return d; }
}

function fmtShort(d) {
  if (!d) return '—';
  try { return new Date(d.slice(0,10) + 'T00:00:00').toLocaleDateString('en-AU', { day:'numeric', month:'short' }); }
  catch(e) { return d; }
}

function fmtMonLabel(key) {
  try { return new Date(key + '-01').toLocaleDateString('en-AU', { month:'short' }); }
  catch(e) { return key; }
}

function fmtMonKey(offset) {
  const d = new Date();
  d.setDate(1);
  d.setMonth(d.getMonth() - offset);
  return d.toISOString().slice(0, 7);
}

function fmtDateTime(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleString('en-AU', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }); }
  catch(e) { return iso; }
}

function fmtRelative(d) {
  if (!d) return '—';
  const dt = typeof d === 'string' ? new Date(d) : d;
  const diff = Math.floor((Date.now() - dt) / 1000);
  if (diff < 60)   return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  if (diff < 604800) return Math.floor(diff/86400) + 'd ago';
  return fmtShort(d.slice ? d.slice(0,10) : dt.toISOString().slice(0,10));
}

// ── Time formatting ──

function fmtMins(m) {
  const h = Math.floor((m||0) / 60);
  const mm = (m||0) % 60;
  return h > 0 ? `${h}h${mm > 0 ? ' ' + mm + 'm' : ''}` : `${mm}m`;
}

function fmtSecs(s) {
  s = s || 0;
  const h  = Math.floor(s / 3600);
  const m  = Math.floor((s % 3600) / 60);
  const ss = s % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}

// ── String helpers ──

function truncate(str, max = 32) {
  if (!str) return '';
  return str.length > max ? str.slice(0, max - 1) + '…' : str;
}

function initials(n) {
  if (!n) return '?';
  return n.split(' ').filter(Boolean).map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

function avColor(s) {
  const c = ['#2d5be3','#7c3aed','#16a34a','#ea580c','#dc2626','#0891b2','#b45309','#be185d'];
  let h = 0;
  for (let i = 0; i < (s||'').length; i++) h = s.charCodeAt(i) + ((h << 5) - h);
  return c[Math.abs(h) % c.length];
}

function avEl(name, size = 'sm') {
  return `<div class="av av-${size}" style="background:${avColor(name)}">${initials(name)}</div>`;
}

// ── Invoice / Quote calculations ──

function calcInv(inv) {
  const sub = (inv.items || []).reduce((s, i) => s + (parseFloat(i.qty)||0) * (parseFloat(i.rate)||0), 0);
  const disc = sub * ((parseFloat(inv.discount)||0) / 100);
  const after = sub - disc;
  const tax = after * ((parseFloat(inv.taxRate)||0) / 100);
  const total = after + tax;
  const paid = (inv.payments || []).reduce((s, p) => s + (parseFloat(p.amount)||0), 0);
  return { sub, disc, after, tax, total, paid, balance: total - paid };
}

function invStatus(inv) {
  if (inv.status === 'paid')      return 'paid';
  if (inv.status === 'cancelled') return 'cancelled';
  if (inv.status === 'draft')     return 'draft';
  if (isOver(inv.due))            return 'overdue';
  return inv.status || 'unpaid';
}

// ── Badge helpers ──

function statusBadge(st) {
  const map = {
    paid:'b-green', sent:'b-blue', unpaid:'b-orange', overdue:'b-red',
    draft:'b-gray', cancelled:'b-gray', accepted:'b-teal', declined:'b-red',
    expired:'b-amber', active:'b-blue', complete:'b-green', paused:'b-gray',
    won:'b-teal', lost:'b-red', new:'b-gray', contacted:'b-blue',
    proposal:'b-orange', negotiation:'b-purple',
  };
  return `<span class="badge ${map[st]||'b-gray'}">${st}</span>`;
}

function priorityBadge(p) {
  const m = { high:'b-red', medium:'b-orange', low:'b-gray' };
  return `<span class="badge ${m[p]||'b-gray'}">${p||'medium'}</span>`;
}

// ── Misc helpers ──

function uid()  { return '_' + Math.random().toString(36).slice(2, 8) + Date.now().toString(36); }
function today(){ return new Date().toISOString().slice(0, 10); }
function addDays(d, n) {
  const dt = new Date(d + 'T00:00:00');
  dt.setDate(dt.getDate() + n);
  return dt.toISOString().slice(0, 10);
}
function subMonths(n) {
  const d = new Date();
  d.setMonth(d.getMonth() - n);
  return d.toISOString().slice(0, 10);
}
function isOver(d) { return !!(d && d < today()); }

function clientName(id) {
  const c = S?.clients?.find(c => c.id === id);
  return c ? c.name : '—';
}
function projName(id) {
  const p = S?.projects?.find(p => p.id === id);
  return p ? p.name : '—';
}

// ── DOM helpers ──

function toast(msg, type = '') {
  const container = document.getElementById('toast-wrap');
  if (!container) return;
  const el = document.createElement('div');
  el.className = `toast${type ? ' ' + type : ''}`;
  const icons = { s:'✓', e:'✕', w:'⚠', '':'ℹ' };
  el.innerHTML = `<span>${icons[type]||'ℹ'}</span> ${msg}`;
  container.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 2800);
}

function showModal(html) {
  const root = document.getElementById('modal-root');
  if (!root) return;
  root.innerHTML = html;
  root.querySelector('.modal-ov')?.addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });
}

function closeModal() {
  const root = document.getElementById('modal-root');
  if (root) root.innerHTML = '';
}

  if (confirm(msg)) cb();

// ── Permission checking helpers ──
// USAGE: can('invoices', 'edit')  →  true/false
function can(module, action) {
  if (!currentUser) return false;
  if (currentUser.role === 'owner') return true; // owners always have access
  const perms = currentUser.permissions || {};
  return !!(perms[module] && perms[module][action]);
}

function canView(module)    { return can(module, 'view');   }
function canCreate(module)  { return can(module, 'create'); }
function canEdit(module)    { return can(module, 'edit');   }
function canDelete(module)  { return can(module, 'delete'); }
function canExport(module)  { return can(module, 'export'); }
function canApprove(module) { return can(module, 'approve');}
function canManage(module)  { return can(module, 'manage'); }
function isOwner()          { return currentUser?.role === 'owner'; }
function isAdmin()          { return ['owner','admin'].includes(currentUser?.role); }

async function authLogin({ email, password }) {
  const users = _getUsers();
  const user = users.find(u => u.email.toLowerCase() === email.toLowerCase());
  if (!user) throw new Error('No account found with that email address.');
  if (user.status === 'suspended') throw new Error('Your account has been suspended. Contact your administrator.');
  if (!_checkPassword(password, user.passwordHash)) throw new Error('Incorrect password.');

  const bizes = _getBizList();
  const business = bizes.find(b => b.id === user.businessId);
  if (!business) throw new Error('Business account not found.');

  const now = new Date().toISOString();
  user.lastActive = now;
  _saveUsers(users);
  _saveSession({ userId: user.id, businessId: business.id, loginAt: now });
  currentUser = user;
  currentBusiness = business;

  auditLog('auth', 'signed_in', 'User signed in', { email });
  return { user, business };
}

function authLogout() {
  auditLog('auth', 'signed_out', 'User signed out', {});
  _saveSession(null);
  currentUser = null;
  currentBusiness = null;
  showAuthScreen();
}

function authRestoreSession() {
  // REPLACE_WITH_BACKEND: Check JWT token validity with server
  const session = _getSession();
  if (!session) return false;
  const users = _getUsers();
  const user = users.find(u => u.id === session.userId);
  if (!user || user.status === 'suspended') { _saveSession(null); return false; }
  const bizes = _getBizList();
  const business = bizes.find(b => b.id === session.businessId);
  if (!business) { _saveSession(null); return false; }
  currentUser = user;
  currentBusiness = business;
  return true;
}

  };
  users.push(user);

function updateTeamMember(userId, updates) {
  const users = _getUsers();
  const idx = users.findIndex(u => u.id === userId);
  if (idx < 0) return;
  users[idx] = { ...users[idx], ...updates };
  _saveUsers(users);
  if (currentUser.id === userId) currentUser = users[idx];
  auditLog('team', 'member_updated', `Updated ${users[idx].name}`, { userId });
}

  updateTeamMember(userId, { status: 'suspended' });

function removeTeamMember(userId) {
  const users = _getUsers();
  const user = users.find(u => u.id === userId);

  auditLog('team', 'member_removed', `Removed ${user?.name || userId}`, { userId });

}

function setRole(userId, role) {
  const defaultPerms = JSON.parse(JSON.stringify(ROLE_PERMISSIONS[role] || ROLE_PERMISSIONS.employee));

}

const AUDIT_KEY = 'folio_audit_v1';

function auditLog(module, action, description, details = {}) {
  // REPLACE_WITH_BACKEND: Write to server audit log
  try {
    const logs = JSON.parse(localStorage.getItem(AUDIT_KEY) || '[]');
    logs.unshift({
      id: '_log_' + Date.now(),
      userId: currentUser?.id || 'system',
      userName: currentUser?.name || 'System',
      userEmail: currentUser?.email || '',
      businessId: currentBusiness?.id || '',
      module,
      action,
      description,
      details,
      timestamp: new Date().toISOString(),
      device: navigator.userAgent.slice(0, 80),
      // REPLACE_WITH_BACKEND: Real IP from server
      ip: '—',
    });
    // Keep last 500 entries
    if (logs.length > 500) logs.splice(500);
    localStorage.setItem(AUDIT_KEY, JSON.stringify(logs));
  } catch(e) {}
}

function getAuditLogs(limit = 100) {
  try {
    const all = JSON.parse(localStorage.getItem(AUDIT_KEY) || '[]');
    return all.filter(l => l.businessId === currentBusiness?.id).slice(0, limit);
  } catch(e) { return []; }
}

function togglePw(id, btn) {
  const inp = document.getElementById(id);
  if (!inp) return;
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}

function checkPwStrength(pw) {
  const fill = document.getElementById('pw-strength-fill');
  const label = document.getElementById('pw-strength-label');
  if (!fill || !label) return;
  let score = 0;
  if (pw.length >= 8) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const levels = [
    { w:'15%', bg:'var(--red)',    text:'Too short' },
    { w:'30%', bg:'var(--red)',    text:'Weak' },
    { w:'60%', bg:'var(--orange)', text:'Fair' },
    { w:'80%', bg:'var(--amber)',  text:'Good' },
    { w:'100%',bg:'var(--green)',  text:'Strong' },
  ];
  const l = levels[Math.min(score, 4)];
  fill.style.width = pw.length === 0 ? '0%' : l.w;
  fill.style.background = l.bg;
  label.textContent = pw.length === 0 ? '' : l.text;
  label.style.color = l.bg;
}

async function handleLogin() {
  clearAuthError();
  const email = document.getElementById('a-email')?.value.trim();
  const password = document.getElementById('a-password')?.value;
  if (!email || !password) { showAuthError('Please enter your email and password.'); return; }
  setAuthLoading(true);
  // Simulate async for UX
  await new Promise(r => setTimeout(r, 600));
  try {
    await authLogin({ email, password });
    hideAuthScreen();
    if (!currentBusiness.onboardingComplete) {
      showOnboarding();
    } else {
      initApp();
    }
  } catch(e) {
    showAuthError(e.message);
    setAuthLoading(false);
  }
}

async function handleSignup() {
  clearAuthError();
  const name     = document.getElementById('s-name')?.value.trim();
  const bizName  = document.getElementById('s-biz')?.value.trim();
  const email    = document.getElementById('s-email')?.value.trim();
  const pw       = document.getElementById('s-pw')?.value;
  const pw2      = document.getElementById('s-pw2')?.value;
  const bizType  = document.getElementById('s-type')?.value;
  const country  = document.getElementById('s-country')?.value;
  const currency = document.getElementById('s-currency')?.value;
  const terms    = document.getElementById('s-terms')?.checked;

  if (!name)    { showAuthError('Please enter your full name.'); return; }
  if (!bizName) { showAuthError('Please enter your business name.'); return; }
  if (!email || !email.includes('@')) { showAuthError('Please enter a valid email address.'); return; }
  if (!pw || pw.length < 8) { showAuthError('Password must be at least 8 characters.'); return; }
  if (pw !== pw2) { showAuthError('Passwords do not match.'); return; }
  if (!terms) { showAuthError('Please accept the Terms of Service to continue.'); return; }

  setAuthLoading(true);
  await new Promise(r => setTimeout(r, 700));
  try {
    await authSignUp({ name, businessName: bizName, email, password: pw, businessType: bizType, country, currency });
    hideAuthScreen();
    showOnboarding();
  } catch(e) {
    showAuthError(e.message);
    setAuthLoading(false);
  }
}

function handleForgot() {
  clearAuthError();
  const email = document.getElementById('f-email')?.value.trim();
  if (!email) { showAuthError('Please enter your email address.'); return; }
  try {
    authResetPassword(email);
    const s = document.getElementById('auth-success');
    if (s) { s.textContent = `Reset link sent to ${email} (mock — check your console in a real app).`; s.style.display = 'block'; }
  } catch(e) {
    showAuthError(e.message);
  }
}

// FOLIO — Navigation, Theme, Sidebar, Command Palette
// All navigation is permission-gated here.
// ═══════════════════════════════════════════════════════════════

let currentPage = 'dashboard';

const pageTitles = {
  dashboard:'Dashboard', clients:'Clients', leads:'Pipeline',
  projects:'Projects', tasks:'Tasks', invoices:'Invoices',
  quotes:'Quotes', time:'Time Tracking', expenses:'Expenses',
  reports:'Reports', calendar:'Calendar', settings:'Settings',
  team:'Team', audit:'Audit Log',
};

// Pages and which permission is required to view them
const pagePermission = {
  dashboard: null,      // always visible
  clients:   'clients',
  leads:     'leads',
  projects:  'projects',
  tasks:     'tasks',
  invoices:  'invoices',
  quotes:    'quotes',
  time:      'time',
  expenses:  'expenses',
  reports:   'reports',
  calendar:  'calendar',
  settings:  'settings',
  team:      'team',
  audit:     'team',    // only admins+ via isAdmin()
};

function nav(page, el) {
  if (currentPage === page) return;

  // Permission gate
  const perm = pagePermission[page];
  if (perm && !canView(perm) && page !== 'team') {
    // Still navigate but show access denied
    currentPage = page;
    _doNav(page, el);
    renderAccessDenied(page);
    return;
  }

  currentPage = page;
  _doNav(page, el);
  render(page);
}

function _doNav(page, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

  const pageEl = document.getElementById('page-' + page);
  if (pageEl) pageEl.classList.add('active');

  if (el) el.classList.add('active');
  else document.querySelector(`[data-page="${page}"]`)?.classList.add('active');

  document.getElementById('topbar-title').textContent = pageTitles[page] || page;

  // Close mobile sidebar
  closeSidebar();
}

function render(page) {
  const fns = {
    dashboard:  renderDash,
    clients:    renderClients,
    leads:      renderLeads,
    projects:   renderProjects,
    tasks:      renderTasks,
    invoices:   renderInvoices,
    quotes:     renderQuotes,
    time:       renderTime,
    expenses:   renderExpenses,
    reports:    renderReports,
    calendar:   renderCalendar,
    settings:   renderSettings,
    team:       renderTeam,
    audit:      renderAuditLog,
  };
  if (fns[page]) fns[page]();
}

function buildSidebar() {
  const nav = document.getElementById('sidebar-nav');
  if (!nav) return;

  const items = [
    { section: 'Overview' },
    { page:'dashboard', icon:'⬡', label:'Dashboard', perm:null },
    { section: 'Work' },
    { page:'clients',  icon:'👥', label:'Clients',  perm:'clients'  },
    { page:'leads',    icon:'🎯', label:'Pipeline', perm:'leads'    },
    { page:'projects', icon:'📁', label:'Projects', perm:'projects' },
    { page:'tasks',    icon:'✅', label:'Tasks',    perm:'tasks', badge:'tasks-badge' },
    { section: 'Finance' },
    { page:'invoices', icon:'📄', label:'Invoices', perm:'invoices', badge:'inv-badge' },
    { page:'quotes',   icon:'📋', label:'Quotes',   perm:'quotes'   },
    { page:'time',     icon:'⏱', label:'Time',     perm:'time'     },
    { page:'expenses', icon:'💸', label:'Expenses', perm:'expenses' },
    { section: 'Insights' },
    { page:'reports',  icon:'📊', label:'Reports',  perm:'reports'  },
    { page:'calendar', icon:'📅', label:'Calendar', perm:'calendar' },
    { section: 'System' },
    { page:'team',     icon:'👤', label:'Team',     perm:'team'     },
    // Audit log only for admins+
    ...(isAdmin() ? [{ page:'audit', icon:'📋', label:'Audit Log', perm:'team' }] : []),
    { page:'settings', icon:'⚙️', label:'Settings', perm:'settings' },
  ];

  nav.innerHTML = items.map(item => {
    if (item.section) return `<div class="nav-section-label">${item.section}</div>`;
    // Hide items the user can't view (except dashboard)
    if (item.perm && !canView(item.perm)) return '';
    return `
      <div class="nav-item${currentPage === item.page ? ' active' : ''}"
           data-page="${item.page}"
           onclick="nav('${item.page}',this)">
        <span class="nav-icon">${item.icon}</span> ${item.label}
        ${item.badge ? `<span class="nav-badge" id="${item.badge}" style="display:none">0</span>` : ''}
      </div>`;
  }).join('');
}

// ── Command Palette ──
function openCmd() {
  if (document.getElementById('cmd-ov')) return;
  const html = `
  <div class="cmd-ov" id="cmd-ov" onclick="if(event.target===this)closeCmd()">
    <div class="cmd">
      <div class="cmd-s">
        <span style="font-size:16px;color:var(--muted)">⌘</span>
        <input type="text" placeholder="Search or run a command…" id="cmd-in"
          oninput="filterCmd(this.value)" autofocus/>
      </div>
      <div class="cmd-res" id="cmd-res"></div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  setTimeout(() => document.getElementById('cmd-in')?.focus(), 50);
  filterCmd('');
}

function closeCmd() {
  document.getElementById('cmd-ov')?.remove();
}

function filterCmd(q) {
  const el = document.getElementById('cmd-res');
  if (!el) return;
  q = q.toLowerCase();

  // Actions filtered by permissions
  const actions = [
    canCreate('invoices') && { icon:'📄', t:'New Invoice',  s:'Create a new invoice',  fn:"closeCmd();openInvModal()"  },
    canCreate('clients')  && { icon:'👤', t:'New Client',   s:'Add a client',           fn:"closeCmd();openClientModal()"},
    canCreate('projects') && { icon:'📁', t:'New Project',  s:'Start a project',        fn:"closeCmd();openProjModal()" },
    canCreate('quotes')   && { icon:'📋', t:'New Quote',    s:'Create a quote',         fn:"closeCmd();openQuoteModal()"},
    canCreate('expenses') && { icon:'💸', t:'Log Expense',  s:'Track an expense',       fn:"closeCmd();openExpModal()"  },
    canCreate('time')     && { icon:'⏱', t:'Start Timer',  s:'Begin tracking time',    fn:"closeCmd();nav('time')"     },
    canCreate('leads')    && { icon:'🎯', t:'Add Lead',     s:'New pipeline lead',      fn:"closeCmd();openLeadModal()" },
  ].filter(Boolean);

  const pages = [
    { icon:'⬡', t:'Dashboard', fn:"closeCmd();nav('dashboard')" },
    canView('clients')  && { icon:'👥', t:'Clients',   fn:"closeCmd();nav('clients')"  },
    canView('invoices') && { icon:'📄', t:'Invoices',  fn:"closeCmd();nav('invoices')" },
    canView('reports')  && { icon:'📊', t:'Reports',   fn:"closeCmd();nav('reports')"  },
    canView('team')     && { icon:'👤', t:'Team',      fn:"closeCmd();nav('team')"     },
  ].filter(Boolean);

  const clients = q ? S?.clients?.filter(c =>
    c.name.toLowerCase().includes(q) || c.email?.toLowerCase().includes(q)
  ).slice(0, 3) : [];

  const invs = q && canView('invoices') ? S?.invoices?.filter(i =>
    i.number.toLowerCase().includes(q) || clientName(i.clientId).toLowerCase().includes(q)
  ).slice(0, 3) : [];

  const filt = items => items.filter(i => !q || i.t.toLowerCase().includes(q) || (i.s||'').toLowerCase().includes(q));
  let html = '';

  const fa = filt(actions);
  if (fa.length) {
    html += `<div class="cmd-sec">Quick Actions</div>`;
    html += fa.map(a => `<div class="cmd-item" onclick="${a.fn}">
      <div class="cmd-ic">${a.icon}</div>
      <div class="cmd-it"><div class="cmd-it-t">${a.t}</div>${a.s?`<div class="cmd-it-s">${a.s}</div>`:''}</div>
    </div>`).join('');
  }

  const fp = filt(pages);
  if (fp.length) {
    html += `<div class="cmd-sec">Navigate</div>`;
    html += fp.map(p => `<div class="cmd-item" onclick="${p.fn}">
      <div class="cmd-ic">${p.icon}</div>
      <div class="cmd-it"><div class="cmd-it-t">${p.t}</div></div>
    </div>`).join('');
  }

  if (clients?.length && canView('clients')) {
    html += `<div class="cmd-sec">Clients</div>`;
    html += clients.map(c => `<div class="cmd-item" onclick="closeCmd();nav('clients')">
      <div class="cmd-ic">👤</div>
      <div class="cmd-it"><div class="cmd-it-t">${c.name}</div><div class="cmd-it-s">${c.email||c.company||''}</div></div>
    </div>`).join('');
  }

  if (invs?.length) {
    html += `<div class="cmd-sec">Invoices</div>`;
    html += invs.map(i => `<div class="cmd-item" onclick="closeCmd();nav('invoices')">
      <div class="cmd-ic">📄</div>
      <div class="cmd-it"><div class="cmd-it-t">${i.number} · ${clientName(i.clientId)}</div><div class="cmd-it-s">${money(calcInv(i).total)} · ${invStatus(i)}</div></div>
    </div>`).join('');
  }

  if (!html) {
    html = `<div style="text-align:center;padding:24px;color:var(--muted);font-size:13px">No results for "${q}"</div>`;
  }
  el.innerHTML = html;
}

function renderDash() {
  auditLog('dashboard', 'viewed', 'Dashboard viewed', {});
  updateBadges();

  const invs  = S.invoices   || [];
  const exps  = S.expenses   || [];
  const projs = S.projects   || [];
  const tasks = S.tasks      || [];

  const earned      = invs.filter(i => i.status === 'paid').reduce((s,i) => s + calcInv(i).total, 0);
  const outstanding = invs.filter(i => ['sent','unpaid'].includes(invStatus(i))).reduce((s,i) => s + calcInv(i).balance, 0);
  const overdueAmt  = invs.filter(i => invStatus(i) === 'overdue').reduce((s,i) => s + calcInv(i).balance, 0);
  const totalExp    = exps.reduce((s,e) => s + parseFloat(e.amount||0), 0);
  const netProfit   = earned - totalExp;
  const activeProj  = projs.filter(p => p.status === 'active').length;
  const overdueT    = tasks.filter(t => t.status !== 'done' && isOver(t.due)).length;

  // Monthly chart (6 months)
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const key = fmtMonKey(i);
    const rev = invs.filter(inv => inv.status === 'paid' && inv.date?.startsWith(key)).reduce((s,inv) => s + calcInv(inv).total, 0);
    const exp = exps.filter(e => e.date?.startsWith(key)).reduce((s,e) => s + parseFloat(e.amount||0), 0);
    months.push({ key, lbl: fmtMonLabel(key), rev, exp });
  }
  const maxChart = Math.max(...months.map(m => Math.max(m.rev, m.exp)), 1);
  const curKey   = fmtMonKey(0);

  // Upcoming deadlines
  const deadlines = [
    ...projs.filter(p => p.status === 'active' && p.deadline).map(p => ({ label:p.name, date:p.deadline, type:'project' })),
    ...tasks.filter(t => t.status !== 'done' && t.due).map(t => ({ label:t.title, date:t.due, type:'task' })),

  const h = new Date().getHours();

  const firstName = (currentUser?.name || '').split(' ')[0] || 'there';

  document.getElementById('page-dashboard').innerHTML = `

    <div class="ph-left">
      <h1>${greet}, ${firstName} 👋</h1>
      <p>Here's your business overview for today.</p>
    </div>
    <div class="ph-right">
      <div class="qa-grid">
        ${canCreate('invoices') ? `<div class="qa" onclick="openInvModal()"><span>📄</span> New Invoice</div>` : ''}
        ${canCreate('clients')  ? `<div class="qa" onclick="openClientModal()"><span>👤</span> Add Client</div>` : ''}
        ${canCreate('time')     ? `<div class="qa" onclick="nav('time')"><span>⏱</span> Start Timer</div>` : ''}
        ${canCreate('expenses') ? `<div class="qa" onclick="openExpModal()"><span>💸</span> Log Expense</div>` : ''}
        ${canCreate('quotes')   ? `<div class="qa" onclick="openQuoteModal()"><span>📋</span> New Quote</div>` : ''}

let clientQ='',clientStatusF='';
function renderClients(){
  if (!canView('clients')) { renderAccessDenied('clients'); return; }

  let list=S.clients||[];
  if(clientQ)list=list.filter(c=>c.name.toLowerCase().includes(clientQ)||c.email?.toLowerCase().includes(clientQ)||c.company?.toLowerCase().includes(clientQ));

  document.getElementById('page-clients').innerHTML=`
  <div class="ph">
    <div class="ph-left"><h1>Clients</h1><p>${S.clients?.length||0} total · ${S.clients?.filter(c=>c.status==='active').length||0} active</p></div>

    <div class="tbl-wrap"><table>
      <thead><tr><th>Client</th><th>Email</th><th>Phone</th><th>Lifetime Value</th><th>Invoices</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>
        ${list.map(c=>{
          const cInvs=S.invoices?.filter(i=>i.clientId===c.id)||[];

          return`<tr>
            <td><div class="flex items-c gap2">${avEl(c.name,'sm')}<div><div class="td-bold">${c.name}</div>${c.company?`<div class="td-muted">${c.company}</div>`:''}</div></div></td>
            <td class="td-muted">${c.email||'—'}</td>

let editCId=null;
function openClientModal(id){
  editCId=id||null;
  const c=id?S.clients.find(c=>c.id===id):null;
  showModal(`<div class="modal-ov"><div class="modal">
    <div class="modal-hd"><h2>${id?'Edit Client':'New Client'}</h2><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="fgrid">
        <div class="fg"><label>Name <span class="req">*</span></label><input class="fc" id="c-name" value="${c?.name||''}"/></div>
        <div class="fg"><label>Company</label><input class="fc" id="c-co" value="${c?.company||''}"/></div>
        <div class="fg"><label>Email</label><input class="fc" id="c-em" value="${c?.email||''}"/></div>
        <div class="fg"><label>Phone</label><input class="fc" id="c-ph" value="${c?.phone||''}"/></div>
        <div class="fg"><label>Website</label><input class="fc" id="c-web" value="${c?.website||''}"/></div>
        <div class="fg"><label>Currency</label><select class="fc" id="c-cur">${['AUD','USD','GBP','EUR','NZD','CAD'].map(x=>`<option ${(c?.currency||'AUD')===x?'selected':''}>${x}</option>`).join('')}</select></div>
        <div class="fg"><label>Status</label><select class="fc" id="c-st"><option value="active" ${(c?.status||'active')==='active'?'selected':''}>Active</option><option value="inactive" ${c?.status==='inactive'?'selected':''}>Inactive</option></select></div>
        <div class="fg"><label>Tags (comma sep.)</label><input class="fc" id="c-tags" value="${(c?.tags||[]).join(', ')}"/></div>
        <div class="fg s2"><label>Address</label><input class="fc" id="c-addr" value="${c?.address||''}"/></div>
        <div class="fg s2"><label>Notes</label><textarea class="fc" id="c-notes">${c?.notes||''}</textarea></div>
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveClient()">Save Client</button>
    </div>
  </div></div>`);
}

function saveClient(){
  const name=document.getElementById('c-name')?.value.trim();
  if(!name){toast('Name required','e');return}
  const cl={
    id:editCId||uid(),name,
    company:document.getElementById('c-co')?.value.trim(),
    email:document.getElementById('c-em')?.value.trim(),
    phone:document.getElementById('c-ph')?.value.trim(),
    website:document.getElementById('c-web')?.value.trim(),
    address:document.getElementById('c-addr')?.value.trim(),
    currency:document.getElementById('c-cur')?.value,
    status:document.getElementById('c-st')?.value,
    tags:document.getElementById('c-tags')?.value.split(',').map(t=>t.trim()).filter(Boolean),
    notes:document.getElementById('c-notes')?.value.trim(),
    createdAt:editCId?(S.clients.find(c=>c.id===editCId)?.createdAt||today()):today(),
  };
  if(editCId){const i=S.clients.findIndex(c=>c.id===editCId);if(i>=0)S.clients[i]=cl;}
  else{S.clients.push(cl);logAct('client','added',name,cl.id,'👤')}
  saveAppData();closeModal();toast(editCId?'Client updated':'Client added','s');renderClients();
}
function delClient(id){
  confirm2('Delete this client?',()=>{
    S.clients=S.clients.filter(c=>c.id!==id);
    saveAppData();renderClients();toast('Client deleted');
  });
}

// ── js/leads.js ──
// FOLIO — Leads

const STAGES=[
  {id:'new',lbl:'New Lead',col:'gray'},
  {id:'contacted',lbl:'Contacted',col:'blue'},
  {id:'proposal',lbl:'Proposal Sent',col:'orange'},
  {id:'negotiation',lbl:'Negotiation',col:'purple'},
  {id:'won',lbl:'Won 🎉',col:'teal'},
  {id:'lost',lbl:'Lost',col:'red'},
];

function renderLeads(){
  if (!canView('leads')) { renderAccessDenied('leads'); return; }
  auditLog('leads', 'viewed', 'Leads page viewed', {});
  
  const leads=S.leads||[];
  const pipe=leads.filter(l=>!['won','lost'].includes(l.stage)).reduce((s,l)=>s+(parseFloat(l.value)||0)*((parseFloat(l.prob)||0)/100),0);
  const won=leads.filter(l=>l.stage==='won').reduce((s,l)=>s+(parseFloat(l.value)||0),0);

  document.getElementById('page-leads').innerHTML=`
  <div class="ph">
    <div class="ph-left"><h1>Sales Pipeline</h1><p>Weighted pipeline: ${money(pipe)} · Won: ${money(won)}</p></div>
    <div class="ph-right"><button class="btn btn-primary" onclick="openLeadModal()">+ New Lead</button></div>
  </div>
  <div class="kanban" id="lead-kanban">
    ${STAGES.map(st=>{
      const stageLds=leads.filter(l=>l.stage===st.id);
      const stVal=stageLds.reduce((s,l)=>s+(parseFloat(l.value)||0),0);
      return`<div class="kb-col" data-stage="${st.id}" ondragover="event.preventDefault()" ondrop="dropLead(event,'${st.id}')">
        <div class="kb-hd">
          <div><div class="kb-title">${st.lbl}</div>${stVal>0?`<div style="font-size:10.5px;color:var(--muted);margin-top:1px">${money(stVal)}</div>`:''}</div>
          <span class="kb-count">${stageLds.length}</span>
        </div>
        <div class="kb-cards">
          ${stageLds.map(l=>`
            <div class="kb-card" draggable="true" ondragstart="dragLead(event,'${l.id}')" onclick="openLeadModal('${l.id}')">
              <div class="kb-ct">${l.name}</div>
              ${l.company?`<div style="font-size:11.5px;color:var(--muted);margin-bottom:5px">${l.company}</div>`:''}
              <div class="kb-meta">
                <span class="badge b-${st.col}">${money(l.value||0)}</span>
                <span style="font-size:11px;color:var(--muted)">${l.prob||0}%</span>
                ${l.followUp&&isOver(l.followUp)?'<span class="badge b-red">Follow up!</span>':''}
              </div>
            </div>
          `).join('')}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

let dragLId=null;
function dragLead(e,id){dragLId=id;e.dataTransfer.effectAllowed='move'}
function dropLead(e,stage){e.preventDefault();if(!dragLId)return;const l=S.leads?.find(l=>l.id===dragLId);if(l){l.stage=stage;saveAppData();renderLeads()}dragLId=null}

let editLId=null;
function openLeadModal(id){
  editLId=id||null;
  const l=id?S.leads?.find(l=>l.id===id):null;
  showModal(`<div class="modal-ov"><div class="modal">
    <div class="modal-hd"><h2>${id?'Edit Lead':'New Lead'}</h2><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="fgrid">
        <div class="fg"><label>Name <span class="req">*</span></label><input class="fc" id="l-name" value="${l?.name||''}"/></div>
        <div class="fg"><label>Company</label><input class="fc" id="l-co" value="${l?.company||''}"/></div>
        <div class="fg"><label>Email</label><input class="fc" id="l-em" value="${l?.email||''}"/></div>
        <div class="fg"><label>Phone</label><input class="fc" id="l-ph" value="${l?.phone||''}"/></div>
        <div class="fg"><label>Value ($)</label><input class="fc" type="number" id="l-val" value="${l?.value||''}"/></div>
        <div class="fg"><label>Probability (%)</label><input class="fc" type="number" id="l-prob" value="${l?.prob||50}" min="0" max="100"/></div>
        <div class="fg"><label>Stage</label><select class="fc" id="l-stage">${STAGES.map(s=>`<option value="${s.id}" ${(l?.stage||'new')===s.id?'selected':''}>${s.lbl}</option>`).join('')}</select></div>
        <div class="fg"><label>Source</label><select class="fc" id="l-src">${['Referral','LinkedIn','Website','Cold Outreach','Conference','Social Media','Other'].map(s=>`<option ${l?.source===s?'selected':''}>${s}</option>`).join('')}</select></div>
        <div class="fg"><label>Follow-up Date</label><input class="fc" type="date" id="l-fu" value="${l?.followUp||''}"/></div>
        <div class="fg s2"><label>Notes</label><textarea class="fc" id="l-notes">${l?.notes||''}</textarea></div>
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      ${id?`<button class="btn btn-danger" onclick="delLead('${id}')">Delete</button>`:''}
      <button class="btn btn-primary" onclick="saveLead()">Save Lead</button>
    </div>
  </div></div>`);
}

function saveLead(){
  const name=document.getElementById('l-name')?.value.trim();
  if(!name){toast('Name required','e');return}
  const lead={
    id:editLId||uid(),name,
    company:document.getElementById('l-co')?.value.trim(),
    email:document.getElementById('l-em')?.value.trim(),
    phone:document.getElementById('l-ph')?.value.trim(),
    value:parseFloat(document.getElementById('l-val')?.value)||0,
    prob:parseFloat(document.getElementById('l-prob')?.value)||0,
    stage:document.getElementById('l-stage')?.value,
    source:document.getElementById('l-src')?.value,
    followUp:document.getElementById('l-fu')?.value,
    notes:document.getElementById('l-notes')?.value.trim(),
    createdAt:editLId?(S.leads.find(l=>l.id===editLId)?.createdAt||today()):today(),
  };
  if(editLId){const i=S.leads.findIndex(l=>l.id===editLId);if(i>=0)S.leads[i]=lead;}
  else{S.leads.push(lead);logAct('lead','added',name,lead.id,'🎯')}
  saveAppData();closeModal();toast(editLId?'Lead updated':'Lead added','s');renderLeads();
}
function delLead(id){S.leads=S.leads.filter(l=>l.id!==id);saveAppData();closeModal();toast('Lead deleted');renderLeads()}

const TASK_COLS=[{id:'todo',lbl:'To Do',col:'gray'},{id:'inprogress',lbl:'In Progress',col:'blue'},{id:'review',lbl:'Review',col:'orange'},{id:'done',lbl:'Done',col:'green'}];

function renderTasks(){
  if (!canView('tasks')) { renderAccessDenied('tasks'); return; }
  auditLog('tasks', 'viewed', 'Tasks page viewed', {});
  
  const tasks=S.tasks||[];
  const open=tasks.filter(t=>t.status!=='done').length;
  const over=tasks.filter(t=>t.status!=='done'&&isOver(t.due)).length;

  document.getElementById('page-tasks').innerHTML=`
  <div class="ph">
    <div class="ph-left"><h1>Tasks</h1><p>${open} open${over>0?` · <span style="color:var(--red)">${over} overdue</span>`:''}</p></div>
    <div class="ph-right"><button class="btn btn-primary" onclick="openTaskModal()">+ New Task</button></div>
  </div>
  <div class="kanban">
    ${TASK_COLS.map(col=>{
      const colTasks=tasks.filter(t=>t.status===col.id);
      return`<div class="kb-col" data-col="${col.id}" ondragover="event.preventDefault()" ondrop="dropTask(event,'${col.id}')">
        <div class="kb-hd"><div class="kb-title">${col.lbl}</div><span class="kb-count">${colTasks.length}</span></div>
        <div class="kb-cards">
          ${colTasks.map(t=>{
            const over=t.status!=='done'&&isOver(t.due);
            const pcol={high:'red',medium:'orange',low:'gray'};
            return`<div class="kb-card" draggable="true" ondragstart="dragTask(event,'${t.id}')" onclick="openTaskModal('${t.id}')">
              ${over?`<div style="height:3px;background:var(--red);border-radius:3px 3px 0 0;margin:-11px -11px 9px"></div>`:''}
              <div class="kb-ct">${t.title}</div>
              <div class="kb-meta">
                ${t.priority?`<span class="badge b-${pcol[t.priority]||'gray'}" style="font-size:10px">${t.priority}</span>`:''}
                ${t.due?`<span style="font-size:11px;color:${over?'var(--red)':'var(--muted)'}">${over?'⚠ ':''}${fmtShort(t.due)}</span>`:''}
                ${t.projectId?`<span style="font-size:11px;color:var(--muted)">${projName(t.projectId).slice(0,15)}</span>`:''}
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

let dragTId=null;
function dragTask(e,id){dragTId=id}
function dropTask(e,col){e.preventDefault();if(!dragTId)return;const t=S.tasks?.find(t=>t.id===dragTId);if(t){t.status=col;if(col==='done')logAct('task','completed',t.title,t.id,'✅');saveAppData();renderTasks();updateBadges()}dragTId=null}

let editTId=null;
function openTaskModal(id){

        <div class="fg"><label>Client</label><select class="fc" id="t-cl"><option value="">— No client —</option>${(S.clients||[]).map(c=>`<option value="${c.id}" ${t?.clientId===c.id?'selected':''}>${c.name}</option>`).join('')}</select></div>
        <div class="fg"><label>Status</label><select class="fc" id="t-st">${TASK_COLS.map(c=>`<option value="${c.id}" ${(t?.status||'todo')===c.id?'selected':''}>${c.lbl}</option>`).join('')}</select></div>
        <div class="fg"><label>Priority</label><select class="fc" id="t-pri">${['high','medium','low'].map(p=>`<option value="${p}" ${(t?.priority||'medium')===p?'selected':''}>${p.charAt(0).toUpperCase()+p.slice(1)}</option>`).join('')}</select></div>
        <div class="fg"><label>Due Date</label><input class="fc" type="date" id="t-due" value="${t?.due||''}"/></div>

function saveTask(){
  const title=document.getElementById('t-title')?.value.trim();

let timerInt=null;

function renderTime(){
  if (!canView('time')) { renderAccessDenied('time'); return; }
  auditLog('time', 'viewed', 'Time page viewed', {});
  
  const tes=S.timeEntries||[];
  const billMins=tes.filter(t=>t.billable).reduce((s,t)=>s+(t.duration||0),0);

  document.getElementById('page-time').innerHTML=`
  <div class="ph">
    <div class="ph-left"><h1>Time Tracking</h1><p>${fmtMins(billMins)} billable · ${money(billVal)} value · ${money(unbilled)} unbilled</p></div>
